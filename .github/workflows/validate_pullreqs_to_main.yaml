name: Validate pull requests to main

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  run_tests:
    name: Compile application and run tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck project
        run: npm run build

      - name: Run tests
        run: npm run test