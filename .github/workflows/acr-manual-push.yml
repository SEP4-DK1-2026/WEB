name: Build and push image to ACR

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: "ACR repository name (defaults to web)"
        required: false
        default: "web"
        type: string
      image_tag:
        description: "Image tag (defaults to commit SHA)"
        required: false
        type: string
      dockerfile:
        description: "Dockerfile path"
        required: false
        default: "Dockerfile"
        type: string
      context:
        description: "Build context"
        required: false
        default: "."
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      IMAGE_NAME: ${{ inputs.image_name || 'web' }}
      IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
      DOCKERFILE: ${{ inputs.dockerfile }}
      CONTEXT: ${{ inputs.context }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          platforms: linux/amd64
          provenance: false
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
