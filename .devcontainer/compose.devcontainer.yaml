services:
  server:
    # Keep the container alive for editor tasks; start Vite from terminal when needed.
    command: sleep infinity
    init: true
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://host.docker.internal:3000}
